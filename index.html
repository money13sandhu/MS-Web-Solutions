<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS Web Solutions | Modern Web Development</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .gradient-text {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="font-sans antialiased">
    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <div class="text-2xl font-bold tracking-tighter">MS.</div>
        <div class="space-x-6 text-sm font-medium text-slate-300">
            <a href="#services" class="hover:text-white transition">Services</a>
            <a href="#portfolio" class="hover:text-white transition">Work</a>
            <a href="#contact" class="hover:text-white transition">Contact Manee</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-32 flex flex-col items-center text-center">
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-6">
            Building Digital <span class="gradient-text">Masterpieces.</span>
        </h1>
        <p class="text-lg md:text-xl text-slate-400 max-w-2xl mb-10">
            MS Web Solutions delivers fast, responsive, and stunning websites engineered to elevate your brand and drive results.
        </p>
        <div class="space-x-4">
            <a href="#contact" class="bg-indigo-500 hover:bg-indigo-600 text-white px-8 py-3 rounded-full font-semibold transition shadow-lg shadow-indigo-500/30">Start a Project</a>
            <a href="#portfolio" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white px-8 py-3 rounded-full font-semibold transition">View Portfolio</a>
        </div>
    </main>
</body>
</html>
